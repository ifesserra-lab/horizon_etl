<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>IFES DEFENDER</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
}
#wrap {
  position: relative;
  display: inline-block;
}
canvas { display: block; }
/* CRT scanlines */
#wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.18) 2px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
  z-index: 10;
}
/* CRT vignette */
#wrap::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center,
    transparent 60%,
    rgba(0,0,0,0.6) 100%
  );
  pointer-events: none;
  z-index: 11;
}
#label {
  color: #003b10;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 6px;
  text-align: center;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
</div>
<div id="label">IFES SERRA · CAMPUS SERRA · PESQUISA &amp; INOVAÇÃO</div>

<script>
// ─── CANVAS SETUP ───────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 560;
canvas.width = W; canvas.height = H;

// ─── PALETTE ────────────────────────────────────────────────────────
const G   = '#00ff41'; // primary green
const DG  = '#005515'; // dim green
const DDG = '#001f08'; // very dim green
const BG  = '#020a03'; // background
const R   = '#ff3333'; // red
const OR  = '#ff8c00'; // orange
const PU  = '#cc44ff'; // purple
const YL  = '#ffee00'; // yellow
const WT  = '#ccffcc'; // white-green

// ─── PIXEL SPRITES ─────────────────────────────────────────────────
// 11×8 grid, 'X'=on '.'=off, scaled × PX pixels
const PX = 4;
const SPRITES = {
  health: [ // vírus / saúde
    '.....X.....',
    '...XXXXX...',
    '.X.XXXXX.X.',
    'XXXXXXXXXXX',
    'X.XXXXXXX.X',
    '.XXXXXXXXX.',
    '..X.....X..',
    '..XX...XX..',
  ],
  industry: [ // máquina / indústria
    '..X.X.X.X..',
    '.XX.XXX.XX.',
    'XXXXXXXXXXX',
    'XX.......XX',
    'XX.......XX',
    'XXXXXXXXXXX',
    '.XX.XXX.XX.',
    '..X.X.X.X..',
  ],
  security: [ // olho / deepfake
    '.XXXXXXXXX.',
    'XX.......XX',
    'X..XXXXX..X',
    'X.XX.X.XX.X',
    'X..XXXXX..X',
    'XX.......XX',
    '.XXXXXXXXX.',
    '....XXX....',
  ],
  energy: [ // nuvem / energia
    '...XXXXX...',
    '.XXXXXXXXX.',
    'XXXXXXXXXXX',
    'XXXXXXXXXXX',
    '.XXXXXXXXX.',
    '...X...X...',
    '..XXX.XXX..',
    '..XXXXXXX..',
  ],
};

const PLAYER_SPR = [
  '......X......',
  '.....XXX.....',
  '.....XXX.....',
  '...XXXXXXX...',
  '...XXXXXXX...',
  '.XXXXXXXXXXX.',
  'XXXXXXXXXXXXX',
];
const PSW = 13, PSH = 7;

// draw sprite at (x,y), color, pixel size
function drawSprite(spr, sw, x, y, color, px) {
  ctx.fillStyle = color;
  for (let row = 0; row < spr.length; row++) {
    for (let col = 0; col < sw; col++) {
      if (spr[row][col] === 'X') {
        ctx.fillRect(x + col*px, y + row*px, px-1, px-1);
      }
    }
  }
}

// ─── AUDIO ──────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type='square', vol=0.15, detune=0) {
  try {
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.type = type;
    o.frequency.value = freq;
    o.detune.value = detune;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + dur);
  } catch(e){}
}
function sfxShoot()   { beep(880, 0.08, 'square', 0.1); }
function sfxHit()     { beep(180, 0.18, 'sawtooth', 0.2); beep(120, 0.22, 'square', 0.1, -30); }
function sfxPlayer()  { beep(100, 0.6, 'sawtooth', 0.3); beep(60, 0.8, 'square', 0.2); }
function sfxWave()    { [880,1100,1320,1760].forEach((f,i) => setTimeout(()=>beep(f,0.15,'square',0.12),i*80)); }
function sfxMove()    { beep(55 + Math.random()*20, 0.06, 'square', 0.05); }

// ─── PROJECTS DATA ─────────────────────────────────────────────────
const PROJECTS = {
  health:   { color: '#ff4466', label: 'SAÚDE',    name: 'CHATRAD / IA MÉDICA',      desc: 'Análise automática de raio-X,\ndetecção de câncer e catarata\npor celular — sem especialista' },
  industry: { color: '#ff8800', label: 'INDÚSTRIA', name: 'VIBROLEARN / GAIN',        desc: 'Diagnóstico de falhas em\nmáquinas industriais por IA\nem tempo real — siderurgia do ES' },
  security: { color: '#cc44ff', label: 'SEGURANÇA', name: 'VERISCAN / DEEPFAKE DET.', desc: 'Detecção de deepfakes e\nimagens manipuladas — combate\nà desinformação digital' },
  energy:   { color: '#ffee00', label: 'ENERGIA',   name: 'LAB ESPAÇO ENERGIA',       desc: 'Energia renovável, eletroposto\nno campus, microrredes e\ngestão inteligente de energia' },
};
const ROW_TYPES = ['health','industry','security','energy'];

// ─── CONSTANTS ──────────────────────────────────────────────────────
const EW = 11*PX, EH = 8*PX;    // enemy sprite size
const ECOLS = 9, EROWS = 4;
const EGAPX = 16, EGAPY = 14;
const ESTEPX = EW + EGAPX;
const ESTEPY = EH + EGAPY;
const GRID_W = ECOLS * ESTEPX - EGAPX;
const GRID_START_X = (W - GRID_W) / 2;
const GRID_START_Y = 90;
const EMOVE_STEP = 14;
const EMOVE_BASE_INTERVAL = 700;
const PLAYER_SPEED = 5;
const BULLET_SPEED = 9;
const EBULLET_SPEED = 4;
const MAX_LIVES = 3;
const SHIELD_Y = H - 110;

// ─── GAME STATE ─────────────────────────────────────────────────────
let state = 'start'; // start | play | gameover | win
let score = 0, hiScore = 0, lives = MAX_LIVES, wave = 1;
let frame = 0;
let popup = null;   // { text, color, timer }
let kills = 0;
let totalKills = 0;

// player
const player = { x: W/2 - PSW*PX/2, y: H-55, w: PSW*PX, h: PSH*PX };
let playerBullets = [];
let canShoot = true;
let shootCooldown = 0;
let playerDead = false;
let playerDeadTimer = 0;
let playerFlash = 0;

// enemies
let enemies = [];
let enemyDir = 1;
let enemyMoveTimer = 0;
let enemyMoveInterval = EMOVE_BASE_INTERVAL;
let enemyBullets = [];
let enemyFireTimer = 0;
let enemyFireInterval = 120;
let enemyStep = 0;  // which column to use for sound step
let lastMoveSound = 0;

// shields
let shields = [];
const SHIELD_COLS = 4;

// explosions
let explosions = [];

// ─── INIT ────────────────────────────────────────────────────────────
function initGame() {
  score = 0; lives = MAX_LIVES; wave = 1;
  kills = 0; totalKills = 0;
  initEnemies(); initShields();
  playerBullets = []; enemyBullets = [];
  explosions = []; popup = null;
  player.x = W/2 - player.w/2;
  playerDead = false; playerFlash = 0;
  enemyDir = 1;
  enemyMoveInterval = EMOVE_BASE_INTERVAL;
  enemyMoveTimer = 0;
  frame = 0;
}

function initEnemies() {
  enemies = [];
  for (let row = 0; row < EROWS; row++) {
    for (let col = 0; col < ECOLS; col++) {
      const type = ROW_TYPES[row];
      const proj = PROJECTS[type];
      enemies.push({
        row, col, type,
        x: GRID_START_X + col * ESTEPX,
        y: GRID_START_Y + row * ESTEPY,
        alive: true,
        color: proj.color,
        spr: SPRITES[type],
        flash: 0,
      });
    }
  }
}

function initShields() {
  shields = [];
  const sw = 52, sh = 32, pixel = 4;
  const gap = W / (SHIELD_COLS + 1);
  for (let s = 0; s < SHIELD_COLS; s++) {
    const bx = Math.round(gap * (s+1) - sw/2);
    // pixel grid 13×8
    const grid = [];
    for (let r = 0; r < 8; r++) {
      const row = [];
      for (let c = 0; c < 13; c++) {
        // arch shape: skip top-center and bottom corners
        const skip = (r < 3 && c >= 4 && c <= 8) || // arch top opening
                     (r >= 6 && (c < 2 || c > 10));  // bottom corners
        row.push(!skip);
      }
      grid.push(row);
    }
    shields.push({ x: bx, y: SHIELD_Y, grid, pixel });
  }
}

// ─── ENEMIES LOGIC ──────────────────────────────────────────────────
function aliveEnemies() { return enemies.filter(e => e.alive); }
function enemyBounds() {
  const alive = aliveEnemies();
  if (!alive.length) return null;
  let minX = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const e of alive) {
    if (e.x < minX) minX = e.x;
    if (e.x + EW > maxX) maxX = e.x + EW;
    if (e.y + EH > maxY) maxY = e.y + EH;
  }
  return { minX, maxX, maxY };
}

function moveEnemies() {
  const alive = aliveEnemies();
  if (!alive.length) return;
  const bounds = enemyBounds();
  let drop = false;
  if (enemyDir > 0 && bounds.maxX + EMOVE_STEP > W - 20) {
    drop = true; enemyDir = -1;
  } else if (enemyDir < 0 && bounds.minX - EMOVE_STEP < 20) {
    drop = true; enemyDir = 1;
  }
  for (const e of alive) {
    if (drop) e.y += ESTEPY * 0.5;
    else e.x += enemyDir * EMOVE_STEP;
  }
  // sound
  sfxMove();
  // check if reached player
  const b2 = enemyBounds();
  if (b2 && b2.maxY >= SHIELD_Y - 10) {
    gameOver();
  }
}

function enemyFire() {
  const alive = aliveEnemies();
  if (!alive.length) return;
  // pick random enemy that is at bottom of its column
  const cols = {};
  for (const e of alive) {
    if (!cols[e.col] || e.row > cols[e.col].row) cols[e.col] = e;
  }
  const shooters = Object.values(cols);
  const e = shooters[Math.floor(Math.random() * shooters.length)];
  enemyBullets.push({
    x: e.x + EW/2 - 2, y: e.y + EH,
    w: 3, h: 10, dy: EBULLET_SPEED,
    type: e.type, color: e.color,
  });
}

// ─── COLLISION ──────────────────────────────────────────────────────
function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function hitShield(bx, by, bw, bh) {
  for (const sh of shields) {
    const sw = sh.grid[0].length, srh = sh.grid.length;
    const px = sh.pixel;
    // relative pos
    const rx = bx - sh.x, ry = by - sh.y;
    // check each pixel
    let hit = false;
    for (let sr = 0; sr < srh && !hit; sr++) {
      for (let sc = 0; sc < sw && !hit; sc++) {
        if (!sh.grid[sr][sc]) continue;
        const px0 = sh.x + sc*px, py0 = sh.y + sr*px;
        if (bx < px0+px && bx+bw > px0 && by < py0+px && by+bh > py0) {
          // destroy shield pixels in radius
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              const nr = sr+dr, nc = sc+dc;
              if (nr>=0 && nr<srh && nc>=0 && nc<sw) sh.grid[nr][nc] = false;
            }
          }
          hit = true;
        }
      }
    }
    if (hit) return true;
  }
  return false;
}

// ─── WAVE CLEAR ─────────────────────────────────────────────────────
function nextWave() {
  wave++;
  enemyMoveInterval = Math.max(150, EMOVE_BASE_INTERVAL - (wave-1)*80);
  enemyFireInterval = Math.max(60, 120 - (wave-1)*10);
  initEnemies();
  initShields();
  playerBullets = []; enemyBullets = [];
  player.x = W/2 - player.w/2;
  playerDead = false; playerFlash = 0;
  popup = { text: 'WAVE ' + wave, color: G, timer: 90 };
  sfxWave();
}

// ─── GAME OVER / WIN ────────────────────────────────────────────────
function gameOver() {
  sfxPlayer();
  if (score > hiScore) hiScore = score;
  state = 'gameover';
}

// ─── INPUT ──────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' && state === 'play') { e.preventDefault(); firePlayer(); }
  if ((e.code === 'Enter' || e.code === 'Space') && state === 'start')  { startPlay(); }
  if ((e.code === 'Enter' || e.code === 'Space') && state === 'gameover') { state='start'; }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// touch / click controls
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (W / rect.width);
  const cy = (e.clientY - rect.top) * (H / rect.height);
  if (state === 'start' || state === 'gameover') { startPlay(); return; }
  if (state === 'play') firePlayer();
});

// touch move for mobile
let touchStartX = null;
canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchmove', e => {
  if (!touchStartX) return;
  const dx = e.touches[0].clientX - touchStartX;
  player.x = Math.max(0, Math.min(W - player.w, player.x + dx * 1.5));
  touchStartX = e.touches[0].clientX;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend', e => { firePlayer(); touchStartX = null; e.preventDefault(); },{passive:false});

function startPlay() {
  if (AC.state === 'suspended') AC.resume();
  initGame();
  state = 'play';
  sfxWave();
}

function firePlayer() {
  if (playerDead || !canShoot || playerBullets.length >= 2) return;
  playerBullets.push({ x: player.x + player.w/2 - 2, y: player.y, w: 4, h: 14, dy: -BULLET_SPEED });
  shootCooldown = 20; canShoot = false;
  sfxShoot();
}

// ─── UPDATE ─────────────────────────────────────────────────────────
function update() {
  frame++;

  if (playerDead) {
    playerDeadTimer--;
    if (playerDeadTimer <= 0) {
      playerDead = false;
      playerFlash = 60;
      player.x = W/2 - player.w/2;
    }
    return;
  }
  if (playerFlash > 0) playerFlash--;

  // player move
  if (keys['ArrowLeft']  || keys['KeyA']) player.x = Math.max(0, player.x - PLAYER_SPEED);
  if (keys['ArrowRight'] || keys['KeyD']) player.x = Math.min(W - player.w, player.x + PLAYER_SPEED);

  // shoot cooldown
  if (!canShoot) { shootCooldown--; if (shootCooldown <= 0) canShoot = true; }

  // player bullets
  playerBullets = playerBullets.filter(b => b.y > -20);
  for (const b of playerBullets) {
    b.y += b.dy;
    // hit shield
    if (hitShield(b.x, b.y, b.w, b.h)) { b.y = -999; continue; }
    // hit enemy
    for (const e of enemies) {
      if (!e.alive) continue;
      if (rectsOverlap(b, { x:e.x, y:e.y, w:EW, h:EH })) {
        e.alive = false;
        b.y = -999;
        kills++; totalKills++;
        score += (EROWS - e.row) * 10 * wave;
        sfxHit();
        // explosion
        explosions.push({ x: e.x + EW/2, y: e.y + EH/2, r: 4, maxR: 30, timer: 20, color: e.color });
        // popup
        const proj = PROJECTS[e.type];
        popup = { title: proj.name, desc: proj.desc, color: proj.color, label: proj.label, timer: 180 };
        break;
      }
    }
  }

  // enemy movement
  enemyMoveTimer += 16;
  // speed up as enemies die
  const aliveCount = aliveEnemies().length;
  const speedMult = Math.max(0.3, aliveCount / (ECOLS * EROWS));
  if (enemyMoveTimer >= enemyMoveInterval * speedMult) {
    enemyMoveTimer = 0;
    moveEnemies();
  }

  // enemy fire
  enemyFireTimer++;
  if (enemyFireTimer >= enemyFireInterval) {
    enemyFireTimer = 0;
    enemyFire();
  }

  // enemy bullets
  enemyBullets = enemyBullets.filter(b => b.y < H + 20);
  for (const b of enemyBullets) {
    b.y += b.dy;
    // zig-zag
    b.x += Math.sin(frame * 0.2 + b.y * 0.1) * 1;
    // hit shield
    if (hitShield(b.x, b.y, b.w, b.h)) { b.y = H+99; continue; }
    // hit player
    if (playerFlash <= 0 && rectsOverlap(b, { x:player.x, y:player.y, w:player.w, h:player.h })) {
      b.y = H+99;
      lives--;
      playerFlash = 0;
      if (lives <= 0) { gameOver(); return; }
      sfxPlayer();
      explosions.push({ x: player.x+player.w/2, y: player.y+player.h/2, r:4, maxR:40, timer:30, color:G });
      playerDead = true;
      playerDeadTimer = 80;
    }
  }

  // explosions
  for (const ex of explosions) {
    ex.r += (ex.maxR - ex.r) * 0.25;
    ex.timer--;
  }
  explosions = explosions.filter(ex => ex.timer > 0);

  // popup
  if (popup) { popup.timer--; if (popup.timer <= 0) popup = null; }

  // flash enemy
  for (const e of enemies) { if (e.flash > 0) e.flash--; }

  // wave clear
  if (aliveEnemies().length === 0) nextWave();
}

// ─── DRAW ────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  if (state === 'start')    { drawStart(); return; }
  if (state === 'gameover') { drawGameOver(); return; }

  drawHUD();
  drawShields();
  drawEnemies();
  drawPlayerBullets();
  drawEnemyBullets();
  drawExplosions();
  if (!playerDead) drawPlayer();
  drawPopup();
  drawFloorLine();
}

function drawHUD() {
  ctx.font = 'bold 14px Courier New';
  ctx.fillStyle = G;
  ctx.textAlign = 'left';
  ctx.fillText('SCORE', 20, 22);
  ctx.fillText(String(score).padStart(6,'0'), 20, 40);

  ctx.textAlign = 'center';
  ctx.fillStyle = DG;
  ctx.fillText('IFES DEFENDER', W/2, 22);
  ctx.fillStyle = G;
  ctx.fillText(`WAVE ${wave}`, W/2, 40);

  ctx.textAlign = 'right';
  ctx.fillStyle = G;
  ctx.fillText('HI-SCORE', W-20, 22);
  ctx.fillText(String(hiScore).padStart(6,'0'), W-20, 40);

  // lives
  ctx.textAlign = 'left';
  ctx.fillStyle = G;
  ctx.fillText('VIDAS:', 20, H-12);
  for (let i = 0; i < lives; i++) {
    drawSprite(PLAYER_SPR, PSW, 90 + i*40, H-25, G, 2);
  }

  // divider line
  ctx.strokeStyle = DG;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 50); ctx.lineTo(W, 50);
  ctx.stroke();
}

function drawFloorLine() {
  ctx.strokeStyle = '#005515';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, H-40); ctx.lineTo(W, H-40);
  ctx.stroke();
}

function drawPlayer() {
  if (playerFlash > 0 && Math.floor(playerFlash/4) % 2 === 0) return;
  drawSprite(PLAYER_SPR, PSW, player.x, player.y, G, PX);
  // engine glow
  ctx.shadowBlur = 8;
  ctx.shadowColor = G;
  drawSprite(PLAYER_SPR, PSW, player.x, player.y, G, PX);
  ctx.shadowBlur = 0;
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    ctx.shadowBlur = 6;
    ctx.shadowColor = e.color;
    drawSprite(e.spr, 11, e.x, e.y, e.color, PX);
    ctx.shadowBlur = 0;
  }
}

function drawPlayerBullets() {
  ctx.shadowBlur = 8; ctx.shadowColor = G;
  for (const b of playerBullets) {
    ctx.fillStyle = G;
    ctx.fillRect(b.x, b.y, b.w, b.h);
  }
  ctx.shadowBlur = 0;
}

function drawEnemyBullets() {
  for (const b of enemyBullets) {
    ctx.shadowBlur = 6; ctx.shadowColor = b.color;
    ctx.fillStyle = b.color;
    // zigzag bullet shape
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.fillRect(b.x-2, b.y+b.h/2, b.w+4, 3);
    ctx.shadowBlur = 0;
  }
}

function drawShields() {
  for (const sh of shields) {
    ctx.fillStyle = G;
    ctx.shadowBlur = 4; ctx.shadowColor = G;
    for (let r = 0; r < sh.grid.length; r++) {
      for (let c = 0; c < sh.grid[r].length; c++) {
        if (sh.grid[r][c]) {
          ctx.fillRect(sh.x + c*sh.pixel, sh.y + r*sh.pixel, sh.pixel-1, sh.pixel-1);
        }
      }
    }
    ctx.shadowBlur = 0;
  }
}

function drawExplosions() {
  for (const ex of explosions) {
    const alpha = ex.timer / 20;
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = ex.color;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 10; ctx.shadowColor = ex.color;
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI*2);
    ctx.stroke();
    // sparks
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      const sr = ex.r * 1.3;
      ctx.beginPath();
      ctx.moveTo(ex.x + Math.cos(a)*ex.r*0.5, ex.y + Math.sin(a)*ex.r*0.5);
      ctx.lineTo(ex.x + Math.cos(a)*sr, ex.y + Math.sin(a)*sr);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawPopup() {
  if (!popup) return;
  const t = popup.timer / 180;
  const alpha = t < 0.2 ? t/0.2 : t > 0.8 ? (t-0.8)/0.2 : 1;
  // wait, we want full opacity most of time then fade:
  const a2 = popup.timer < 40 ? popup.timer/40 : 1;
  ctx.globalAlpha = a2;

  const pw = 300, ph = 110;
  const px = W - pw - 14, py = 56;

  // background
  ctx.fillStyle = '#000';
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = popup.color;
  ctx.lineWidth = 2;
  ctx.shadowBlur = 10; ctx.shadowColor = popup.color;
  ctx.strokeRect(px, py, pw, ph);
  ctx.shadowBlur = 0;

  // label chip
  ctx.fillStyle = popup.color;
  ctx.fillRect(px+10, py-10, 90, 20);
  ctx.fillStyle = '#000';
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('► ' + popup.label, px+15, py+4);

  // title
  ctx.fillStyle = popup.color;
  ctx.font = 'bold 12px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(popup.title, px+12, py+26);

  // desc (multiline)
  ctx.fillStyle = DG.replace('#','#5'); // lighter dim
  ctx.fillStyle = '#44aa66';
  ctx.font = '11px Courier New';
  const lines = popup.desc.split('\n');
  lines.forEach((line, i) => {
    ctx.fillText(line, px+12, py+46 + i*17);
  });

  ctx.globalAlpha = 1;
}

// ─── START SCREEN ───────────────────────────────────────────────────
function drawStart() {
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,W,H);

  // title glow
  ctx.font = 'bold 52px Courier New';
  ctx.textAlign = 'center';
  ctx.shadowBlur = 20; ctx.shadowColor = G;
  ctx.fillStyle = G;
  ctx.fillText('IFES', W/2, 120);
  ctx.fillText('DEFENDER', W/2, 178);
  ctx.shadowBlur = 0;

  ctx.fillStyle = DG;
  ctx.font = '14px Courier New';
  ctx.fillText('CAMPUS SERRA · PESQUISA & INOVAÇÃO', W/2, 210);

  // legend
  const types = ['health','industry','security','energy'];
  const labels = ['SAÚDE COM IA','INDÚSTRIA 4.0','SEGURANÇA DIGITAL','ENERGIA VERDE'];
  const colors = [R, OR, PU, YL];
  types.forEach((t, i) => {
    const ex = W/2 - 180;
    const ey = 250 + i * 50;
    ctx.shadowBlur = 8; ctx.shadowColor = colors[i];
    drawSprite(SPRITES[t], 11, ex, ey, colors[i], 3);
    ctx.shadowBlur = 0;
    ctx.fillStyle = colors[i];
    ctx.font = 'bold 13px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText('= ' + labels[i], ex + 44, ey + 16);
  });

  // blink
  if (Math.floor(frame/30) % 2 === 0) {
    ctx.fillStyle = G;
    ctx.font = 'bold 16px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('[ ENTER / CLICK / TAP PARA INICIAR ]', W/2, 470);
  }

  ctx.fillStyle = DG;
  ctx.font = '11px Courier New';
  ctx.fillText('← → para mover  |  ESPAÇO / CLICK para atirar', W/2, 510);
  ctx.fillText('HI-SCORE: ' + String(hiScore).padStart(6,'0'), W/2, 530);

  frame++;
}

// ─── GAME OVER SCREEN ───────────────────────────────────────────────
function drawGameOver() {
  ctx.fillStyle = BG;
  ctx.fillRect(0,0,W,H);

  ctx.font = 'bold 52px Courier New';
  ctx.textAlign = 'center';
  ctx.shadowBlur = 20; ctx.shadowColor = R;
  ctx.fillStyle = R;
  ctx.fillText('GAME OVER', W/2, 160);
  ctx.shadowBlur = 0;

  ctx.fillStyle = G;
  ctx.font = 'bold 22px Courier New';
  ctx.fillText('PONTUAÇÃO FINAL: ' + score, W/2, 220);

  ctx.fillStyle = YL;
  ctx.font = '16px Courier New';
  ctx.fillText('HI-SCORE: ' + hiScore, W/2, 258);

  ctx.fillStyle = DG;
  ctx.font = '13px Courier New';
  ctx.fillText('INIMIGOS DESTRUÍDOS: ' + totalKills, W/2, 295);

  // rank
  const pct = totalKills / (ECOLS * EROWS);
  let rank, rankColor;
  if (pct >= 0.9)      { rank = 'DOUTOR HONORIS CAUSA'; rankColor = YL; }
  else if (pct >= 0.6) { rank = 'PESQUISADOR SÊNIOR';   rankColor = G;  }
  else if (pct >= 0.3) { rank = 'BOLSISTA IC';           rankColor = OR; }
  else                  { rank = 'CURIOSO EM FORMAÇÃO';  rankColor = DG.replace('005515','4499aa'); }

  ctx.shadowBlur = 10; ctx.shadowColor = rankColor;
  ctx.fillStyle = rankColor;
  ctx.font = 'bold 20px Courier New';
  ctx.fillText('► ' + rank + ' ◄', W/2, 345);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#003b10';
  ctx.font = '12px Courier New';
  ctx.fillText('Todos os projetos são desenvolvidos por', W/2, 395);
  ctx.fillStyle = G;
  ctx.fillText('alunos e professores do IFES Serra — escola pública', W/2, 415);

  if (Math.floor(frame/30) % 2 === 0) {
    ctx.fillStyle = G;
    ctx.font = 'bold 16px Courier New';
    ctx.fillText('[ ENTER / CLICK PARA JOGAR NOVAMENTE ]', W/2, 470);
  }

  frame++;
}

// ─── MAIN LOOP ──────────────────────────────────────────────────────
function loop() {
  if (state === 'play') update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
