<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>IFES RUNNER</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden;
  font-family:'Courier New', monospace;
  user-select:none;
}
#wrap { position:relative; display:inline-block; }
canvas { display:block; cursor:pointer; }
/* scanlines */
#wrap::after {
  content:'';
  position:absolute; inset:0;
  background:repeating-linear-gradient(to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
  pointer-events:none; z-index:10;
}
#tip {
  color:#222; font-size:11px; letter-spacing:3px;
  text-transform:uppercase; margin-top:6px; text-align:center;
}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="tip">ESPAÇO / SETA CIMA / TOQUE — pular · SETA BAIXO — abaixar</div>

<script>
// ── SETUP ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 420;
canvas.width = W; canvas.height = H;

// ── ZONES ─────────────────────────────────────────────────────────
const ZONES = [
  {
    id: 'health',
    name: 'SAÚDE COM IA',
    skyTop: '#051a0a', skyBot: '#0d3a18',
    groundTop: '#1a5c1a', groundBot: '#0d2e0d',
    accent: '#00ff88', dim: '#004422',
    obstColor: '#ff4466', obstColor2: '#cc1133',
    collectColor: '#88ffcc',
    projects: [
      { name:'ChatRad', desc:'Sistema de IA analisa\nraio-X automaticamente —\nsem radiologista disponível' },
      { name:'Detecção de Câncer de Mama', desc:'Redes neurais convolucionais\nfazem pré-diagnóstico\nde imagens médicas' },
      { name:'Triagem de Catarata', desc:'Câmera do celular +\nvisão computacional detecta\ncatarata sem equipamento caro' },
    ],
    bgDraw: drawHealthBg,
  },
  {
    id: 'industry',
    name: 'INDÚSTRIA 4.0',
    skyTop: '#150800', skyBot: '#2e1500',
    groundTop: '#5c3300', groundBot: '#2e1800',
    accent: '#ff8800', dim: '#442200',
    obstColor: '#ff6600', obstColor2: '#cc3300',
    collectColor: '#ffcc44',
    projects: [
      { name:'VibroLearn', desc:'Diagnóstico de falhas\nem máquinas industriais\nvia análise de vibração + IA' },
      { name:'GAIn – Automação Industrial', desc:'Primeiro grupo de pesquisa\ndo IFES Serra (2007) —\nIA para siderurgia do ES' },
      { name:'Monitoramento de Correias', desc:'IA detecta rasgo em\ncorreias transportadoras\nantes da quebra' },
    ],
    bgDraw: drawIndustryBg,
  },
  {
    id: 'security',
    name: 'SEGURANÇA DIGITAL',
    skyTop: '#0a0015', skyBot: '#150030',
    groundTop: '#2a0050', groundBot: '#150028',
    accent: '#cc44ff', dim: '#330055',
    obstColor: '#9922ee', obstColor2: '#6600bb',
    collectColor: '#ee88ff',
    projects: [
      { name:'VeriScan', desc:'IA detecta imagens\nmanipuladas por computador\ne deepfakes' },
      { name:'Sistema Anti-Deepfake', desc:'Análise multimodal de\ntexto, imagem e vídeo\npara combater desinformação' },
      { name:'Defesa contra DDoS', desc:'Arquitetura com eBPF/XDP\nprotege redes contra\nataques cibernéticos em tempo real' },
    ],
    bgDraw: drawSecurityBg,
  },
  {
    id: 'energy',
    name: 'ENERGIA VERDE',
    skyTop: '#0a0a00', skyBot: '#1e1e00',
    groundTop: '#3a4a00', groundBot: '#1e2600',
    accent: '#eeee00', dim: '#333300',
    obstColor: '#888833', obstColor2: '#555511',
    collectColor: '#ffff44',
    projects: [
      { name:'Lab Espaço Energia', desc:'Eletroposto no campus\ncom energia renovável —\nfuturo da mobilidade elétrica' },
      { name:'Microrredes Inteligentes', desc:'Gerenciamento de energia\ndescentralizado com IA\npara bairros sustentáveis' },
      { name:'Estação Meteorológica', desc:'Monitoramento climático\nem parceria com CEPDEC\npara planejar geração de energia' },
    ],
    bgDraw: drawEnergyBg,
  },
];

const ZONE_LENGTH = 1400; // distance units per zone

// ── AUDIO ─────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function tone(freq, dur, type='square', vol=0.12, slide=0) {
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,AC.currentTime);
    if(slide) o.frequency.linearRampToValueAtTime(slide,AC.currentTime+dur);
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime+dur);
  } catch(e){}
}
const sfxJump    = () => tone(300,0.12,'square',0.15,600);
const sfxJump2   = () => tone(500,0.10,'square',0.12,900);
const sfxDie     = () => { tone(400,0.1,'sawtooth',0.2); setTimeout(()=>tone(200,0.3,'sawtooth',0.2),100); setTimeout(()=>tone(100,0.5,'sawtooth',0.2),250); };
const sfxCollect = () => { tone(880,0.06,'square',0.12); setTimeout(()=>tone(1320,0.08,'square',0.1),60); };
const sfxZone    = () => [440,550,660,880].forEach((f,i)=>setTimeout(()=>tone(f,0.1,'square',0.1),i*70));
const sfxStep    = () => tone(80+Math.random()*30,0.04,'square',0.04);

// ── CONSTANTS ─────────────────────────────────────────────────────
const GRAVITY      = 0.65;
const JUMP_V       = -13.5;
const JUMP2_V      = -11;
const GROUND_Y     = 330;
const PW = 28, PH = 46; // player w/h
const HUD_H        = 40;
const INIT_SPEED   = 4.5;
const MAX_SPEED    = 11;

// ── STATE ──────────────────────────────────────────────────────────
let state = 'start'; // start | playing | dead | gameover
let gameSpeed = 4.5, distance = 0, score = 0, hiScore = 0;
let zoneIdx = 0, zoneProgress = 0, zoneFade = 1, zoneTransitioning = false, zoneBanner = null;
let stepTimer = 0;
let frame = 0;

// player
const player = {
  x: 100, y: GROUND_Y - PH,
  vy: 0, grounded: true,
  jumpCount: 0,
  runTimer: 0, runFrame: 0,
  dead: false, deadTimer: 0,
  ducking: false,
  duckTimer: 0,
};

// entities
let obstacles = [];
let collectibles = [];
let particles = [];
let popup = null;
let obstTimer = 0;
let obstInterval = 95;
let collectTimer = 0;
let collectInterval = 220;

// bg scroll
let bgX1 = 0; // far layer
let bgX2 = 0; // mid layer
let groundX = 0;

// ── INIT ──────────────────────────────────────────────────────────
function initGame() {
  gameSpeed = INIT_SPEED;
  distance = 0; score = 0;
  zoneIdx = 0; zoneProgress = 0; zoneFade = 1; zoneTransitioning = false;
  zoneBanner = null;
  obstacles = []; collectibles = []; particles = [];
  popup = null; frame = 0;
  obstTimer = 0; obstInterval = 95;
  collectTimer = 0;
  bgX1 = 0; bgX2 = 0; groundX = 0;
  player.y = GROUND_Y - PH; player.vy = 0;
  player.grounded = true; player.jumpCount = 0;
  player.dead = false; player.deadTimer = 0;
  player.runTimer = 0; player.runFrame = 0;
  player.ducking = false; player.duckTimer = 0;
}

// ── INPUT ──────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (['Space','ArrowUp','ArrowDown','KeyW','KeyS'].includes(e.code)) e.preventDefault();
  if (!keys[e.code]) {
    if ((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') && state==='playing') jump();
    if ((e.code==='ArrowDown'||e.code==='KeyS') && state==='playing') duck();
    if ((e.code==='Space'||e.code==='Enter') && state==='start') startGame();
    if ((e.code==='Space'||e.code==='Enter') && state==='gameover') state='start';
  }
  keys[e.code] = true;
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if ((e.code==='ArrowDown'||e.code==='KeyS') && state==='playing') unduck();
});

canvas.addEventListener('click', () => {
  if (AC.state==='suspended') AC.resume();
  if (state==='start') startGame();
  else if (state==='playing') jump();
  else if (state==='gameover') state='start';
});

let touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (AC.state==='suspended') AC.resume();
  touchStartY = e.touches[0].clientY;
  if (state==='start') { startGame(); return; }
  if (state==='gameover') { state='start'; return; }
  if (state==='playing') jump();
},{passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 30 && state==='playing') { duck(); setTimeout(unduck, 400); }
},{passive:false});

function startGame() {
  initGame();
  state = 'playing';
  sfxZone();
}

function jump() {
  if (player.dead) return;
  player.ducking = false;
  if (player.jumpCount === 0) {
    player.vy = JUMP_V;
    player.grounded = false;
    player.jumpCount = 1;
    sfxJump();
    spawnJumpParticles();
  } else if (player.jumpCount === 1) {
    player.vy = JUMP2_V;
    player.jumpCount = 2;
    sfxJump2();
    spawnJumpParticles();
  }
}

function duck() {
  if (!player.grounded || player.dead) return;
  player.ducking = true;
}
function unduck() { player.ducking = false; }

// ── SPAWN ─────────────────────────────────────────────────────────
function spawnObstacle() {
  const zone = ZONES[zoneIdx];
  const types = ['tall','wide','flying'];
  // avoid flying too early
  const avail = gameSpeed < 6 ? ['tall','wide'] : types;
  const type = avail[Math.floor(Math.random() * avail.length)];
  let x=W+10, y, w, h;
  if (type==='tall')   { w=22; h=55; y=GROUND_Y-h; }
  if (type==='wide')   { w=55; h=28; y=GROUND_Y-h; }
  if (type==='flying') { w=40; h=24; y=GROUND_Y - PH*2 - 20 - Math.random()*30; }
  obstacles.push({ x, y, w, h, type, color:zone.obstColor, color2:zone.obstColor2, zone:zoneIdx });
}

function spawnCollectible() {
  const zone = ZONES[zoneIdx];
  const proj = zone.projects[Math.floor(Math.random()*zone.projects.length)];
  collectibles.push({
    x: W+10, y: GROUND_Y - PH - 60 - Math.random()*40,
    w:20, h:20, color:zone.collectColor,
    floatOffset: Math.random()*Math.PI*2,
    project: proj, zone: zoneIdx, collected:false,
  });
}

function spawnJumpParticles() {
  const pw = player.ducking ? PW : PW, ph = player.ducking ? PH/2 : PH;
  for (let i=0;i<8;i++) {
    particles.push({
      x: player.x + pw/2, y: player.y + ph,
      vx: (Math.random()-0.5)*3, vy: Math.random()*-2,
      life:20, maxLife:20,
      color: ZONES[zoneIdx].accent, size:3,
    });
  }
}

function spawnDeathParticles() {
  for (let i=0;i<30;i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = 2+Math.random()*5;
    particles.push({
      x:player.x+PW/2, y:player.y+PH/2,
      vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd-2,
      life:40, maxLife:40,
      color: i%2===0?'#fff':ZONES[zoneIdx].accent, size:4,
    });
  }
}

// ── UPDATE ─────────────────────────────────────────────────────────
function update() {
  frame++;
  gameSpeed = Math.min(MAX_SPEED, INIT_SPEED + distance * 0.0025);
  distance += gameSpeed * 0.1;

  // zone
  zoneProgress += gameSpeed * 0.1;
  if (zoneProgress >= ZONE_LENGTH && !zoneTransitioning) {
    zoneTransitioning = true;
    zoneFade = 0;
    const next = (zoneIdx+1) % ZONES.length;
    zoneBanner = { text: ZONES[next].name, color: ZONES[next].accent, timer: 120 };
    zoneIdx = next;
    zoneProgress = 0;
    sfxZone();
  }
  if (zoneTransitioning) {
    zoneFade = Math.min(1, zoneFade + 0.03);
    if (zoneFade >= 1) zoneTransitioning = false;
  }
  if (zoneBanner) { zoneBanner.timer--; if(zoneBanner.timer<=0) zoneBanner=null; }

  // scroll bg
  bgX1 -= gameSpeed * 0.15;
  bgX2 -= gameSpeed * 0.4;
  groundX -= gameSpeed;
  if (bgX1 < -W) bgX1 += W;
  if (bgX2 < -W*2) bgX2 += W*2;
  if (groundX < -60) groundX += 60;

  // player physics
  if (!player.dead) {
    player.vy += GRAVITY;
    player.y += player.vy;
    const ground = GROUND_Y - (player.ducking ? PH/2 : PH);
    if (player.y >= ground) {
      player.y = ground;
      player.vy = 0;
      if (!player.grounded) {
        player.grounded = true;
        player.jumpCount = 0;
      }
    } else {
      player.grounded = false;
    }

    // run animation
    if (player.grounded) {
      player.runTimer++;
      if (player.runTimer >= 8) { player.runTimer=0; player.runFrame^=1; }
      // step sound
      stepTimer++;
      if (stepTimer >= Math.floor(16 / (gameSpeed/5))) { stepTimer=0; sfxStep(); }
    }

    // spawn obstacles
    obstTimer++;
    if (obstTimer >= obstInterval) {
      obstTimer = 0;
      obstInterval = Math.max(45, 95 - (gameSpeed - INIT_SPEED) * 7);
      spawnObstacle();
    }

    // spawn collectibles
    collectTimer++;
    if (collectTimer >= collectInterval) {
      collectTimer = 0;
      spawnCollectible();
    }

    // player hitbox (smaller than visual for fairness)
    const margin = 5;
    const phit = {
      x: player.x + margin,
      y: player.y + margin,
      w: PW - margin*2,
      h: (player.ducking ? PH/2 : PH) - margin*2,
    };

    // obstacle collision
    for (const ob of obstacles) {
      if (ob.x < phit.x+phit.w && ob.x+ob.w > phit.x && ob.y < phit.y+phit.h && ob.y+ob.h > phit.y) {
        player.dead = true;
        player.deadTimer = 90;
        spawnDeathParticles();
        sfxDie();
        if (score > hiScore) hiScore = score;
      }
    }

    // collectible collision
    for (const c of collectibles) {
      if (c.collected) continue;
      if (c.x < player.x+PW && c.x+c.w > player.x && c.y < player.y+PH && c.y+c.h > player.y) {
        c.collected = true;
        score += 50;
        sfxCollect();
        popup = { title: c.project.name, desc: c.project.desc, color: ZONES[c.zone].accent, timer: 200 };
        for (let i=0;i<15;i++) {
          const a=Math.random()*Math.PI*2, sp=1+Math.random()*4;
          particles.push({ x:c.x+c.w/2, y:c.y+c.h/2, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2, life:30, maxLife:30, color:c.color, size:3 });
        }
      }
    }

    score = Math.round(distance * 0.5 + collectibles.filter(c=>c.collected).length * 50);
  } else {
    player.deadTimer--;
    if (player.deadTimer <= 0) state = 'gameover';
  }

  // move/cull obstacles
  for (const ob of obstacles) ob.x -= gameSpeed;
  obstacles = obstacles.filter(ob => ob.x > -100);

  // move/cull collectibles
  for (const c of collectibles) c.x -= gameSpeed;
  collectibles = collectibles.filter(c => c.x > -50);

  // particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  // popup
  if (popup) { popup.timer--; if(popup.timer<=0) popup=null; }
}

// ── BACKGROUND DRAWERS ────────────────────────────────────────────
function drawHealthBg(alpha) {
  // sky gradient
  const sky = ctx.createLinearGradient(0,0,0,GROUND_Y);
  sky.addColorStop(0,'#051a0a'); sky.addColorStop(1,'#0d3a18');
  ctx.fillStyle = sky; ctx.globalAlpha = alpha;
  ctx.fillRect(0,0,W,GROUND_Y);
  // background crosses (hospitals)
  ctx.fillStyle = '#0d2e10';
  for (let i=0;i<5;i++) {
    const bx = ((bgX1 + i*180)%W + W)%W, by = GROUND_Y-90;
    ctx.fillRect(bx+20,by+10,10,50); ctx.fillRect(bx+5,by+25,40,20); // cross
    ctx.fillRect(bx,by-20,60,70); // building
  }
  // midground trees
  ctx.fillStyle = '#165c1a';
  for (let i=0;i<9;i++) {
    const tx = ((bgX2 + i*100)%W + W)%W, ty = GROUND_Y-45;
    // tree trunk
    ctx.fillRect(tx+12,ty+20,6,25);
    // foliage
    ctx.beginPath();
    ctx.moveTo(tx+15,ty-10); ctx.lineTo(tx,ty+20); ctx.lineTo(tx+30,ty+20);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(tx+15,ty+5); ctx.lineTo(tx+2,ty+28); ctx.lineTo(tx+28,ty+28);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawIndustryBg(alpha) {
  const sky = ctx.createLinearGradient(0,0,0,GROUND_Y);
  sky.addColorStop(0,'#150800'); sky.addColorStop(1,'#2e1500');
  ctx.fillStyle = sky; ctx.globalAlpha = alpha;
  ctx.fillRect(0,0,W,GROUND_Y);
  // factories
  ctx.fillStyle = '#2e1200';
  for (let i=0;i<4;i++) {
    const fx = ((bgX1 + i*210)%W + W)%W;
    ctx.fillRect(fx, GROUND_Y-110, 80, 110);
    ctx.fillRect(fx+15, GROUND_Y-150, 20, 50);
    ctx.fillRect(fx+50, GROUND_Y-130, 20, 40);
    // smoke puffs
    ctx.fillStyle = '#222';
    for (let s=0;s<3;s++) {
      const si = (frame*0.5 + s*20) % 60;
      ctx.beginPath();
      ctx.arc(fx+25, GROUND_Y-150-si, 8-si*0.1, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle = '#2e1200';
  }
  // pipes / midground
  ctx.fillStyle = '#441800';
  for (let i=0;i<6;i++) {
    const px2 = ((bgX2 + i*140)%W + W)%W;
    ctx.fillRect(px2, GROUND_Y-40, 12, 40);
    ctx.fillRect(px2-8, GROUND_Y-40, 28, 10);
  }
  ctx.globalAlpha = 1;
}

function drawSecurityBg(alpha) {
  const sky = ctx.createLinearGradient(0,0,0,GROUND_Y);
  sky.addColorStop(0,'#080010'); sky.addColorStop(1,'#150030');
  ctx.fillStyle = sky; ctx.globalAlpha = alpha;
  ctx.fillRect(0,0,W,GROUND_Y);
  // grid lines
  ctx.strokeStyle = '#1a0040'; ctx.lineWidth=1;
  for (let gx=0;gx<W;gx+=40) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,GROUND_Y); ctx.stroke(); }
  for (let gy=0;gy<GROUND_Y;gy+=40) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
  // server towers
  ctx.fillStyle = '#1a0040';
  for (let i=0;i<5;i++) {
    const sx = ((bgX1 + i*170)%W + W)%W;
    ctx.fillRect(sx, GROUND_Y-100, 50, 100);
    ctx.fillStyle = '#2a0060';
    for (let r=0;r<5;r++) {
      ctx.fillRect(sx+5, GROUND_Y-90+r*18, 40, 12);
      // LED blink
      const led = Math.sin(frame*0.1+i*1.3+r*0.7) > 0;
      ctx.fillStyle = led ? '#cc44ff' : '#440066';
      ctx.fillRect(sx+38, GROUND_Y-86+r*18, 4, 4);
      ctx.fillStyle = '#2a0060';
    }
    ctx.fillStyle = '#1a0040';
  }
  // floating data particles
  ctx.fillStyle = '#330066';
  for (let i=0;i<20;i++) {
    const dx = ((bgX2*1.5 + i*55)%W + W)%W;
    const dy = 30+i*12;
    if (dy < GROUND_Y-10) ctx.fillRect(dx, dy, 3, 3);
  }
  ctx.globalAlpha = 1;
}

function drawEnergyBg(alpha) {
  const sky = ctx.createLinearGradient(0,0,0,GROUND_Y);
  sky.addColorStop(0,'#0a0a00'); sky.addColorStop(1,'#1e2200');
  ctx.fillStyle = sky; ctx.globalAlpha = alpha;
  ctx.fillRect(0,0,W,GROUND_Y);
  // wind turbines
  for (let i=0;i<4;i++) {
    const wx = ((bgX1 + i*200)%W + W)%W;
    const wangle = frame * 0.02 + i * 1.2;
    ctx.fillStyle = '#2a2a00';
    ctx.fillRect(wx+17, GROUND_Y-130, 6, 130); // mast
    // blades
    ctx.save();
    ctx.translate(wx+20, GROUND_Y-125);
    ctx.rotate(wangle);
    ctx.fillStyle = '#444400';
    for (let b=0;b<3;b++) {
      ctx.save();
      ctx.rotate(b * Math.PI*2/3);
      ctx.fillRect(-3, -40, 5, 40);
      ctx.restore();
    }
    ctx.restore();
  }
  // solar panels
  ctx.fillStyle = '#222200';
  for (let i=0;i<6;i++) {
    const sx = ((bgX2 + i*130)%W + W)%W;
    ctx.fillRect(sx, GROUND_Y-35, 50, 5);
    ctx.fillStyle = '#333300';
    ctx.fillRect(sx+2, GROUND_Y-50, 46, 18);
    // panel cells
    ctx.fillStyle = '#222200';
    for (let c=0;c<3;c++) ctx.fillRect(sx+4+c*15, GROUND_Y-48, 13, 14);
    ctx.fillStyle = '#222200';
  }
  ctx.globalAlpha = 1;
}

// ── DRAW GROUND ───────────────────────────────────────────────────
function drawGround() {
  const zone = ZONES[zoneIdx];
  // top strip
  const gt = ctx.createLinearGradient(0,GROUND_Y,0,H);
  gt.addColorStop(0, zone.groundTop); gt.addColorStop(1, zone.groundBot);
  ctx.fillStyle = gt;
  ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
  // ground line highlight
  ctx.fillStyle = zone.accent;
  ctx.globalAlpha = 0.3;
  ctx.fillRect(0, GROUND_Y, W, 2);
  ctx.globalAlpha = 1;
  // scrolling tiles
  ctx.fillStyle = zone.dim;
  ctx.globalAlpha = 0.5;
  for (let i=0;i<20;i++) {
    const tx = ((groundX + i*60)%W + W)%W;
    ctx.fillRect(tx, GROUND_Y+4, 50, 4);
    ctx.fillRect(tx+10, GROUND_Y+10, 30, 2);
  }
  ctx.globalAlpha = 1;
}

// ── DRAW PLAYER ───────────────────────────────────────────────────
function drawPlayer() {
  if (player.dead) {
    // wobble and fade
    const alpha = player.deadTimer / 90;
    ctx.globalAlpha = alpha;
    ctx.save();
    ctx.translate(player.x + PW/2, player.y + PH/2);
    ctx.rotate((90 - player.deadTimer) * 0.08);
    ctx.translate(-PW/2, -PH/2);
    drawCharacter(0, 0, player.runFrame, 'dead');
    ctx.restore();
    ctx.globalAlpha = 1;
    return;
  }
  const state2 = !player.grounded ? 'jump' : player.ducking ? 'duck' : 'run';
  drawCharacter(player.x, player.y, player.runFrame, state2);
}

function drawCharacter(x, y, runFrame, state2) {
  const zone = ZONES[zoneIdx];
  const ac = zone.accent;
  const duck = state2 === 'duck';
  const jump = state2 === 'jump';
  const oy = duck ? PH/2 : 0; // offset y when ducking

  // BODY
  ctx.fillStyle = '#ddeedd';
  ctx.fillRect(x+4, y+oy+16, PW-8, duck?12:20);

  // IFES badge on body
  ctx.fillStyle = ac;
  ctx.fillRect(x+5, y+oy+18, PW-10, duck?8:14);
  ctx.fillStyle = '#001a0a';
  ctx.font = 'bold 7px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('IFES', x+PW/2, y+oy+(duck?24:28));

  if (!duck) {
    // NECK
    ctx.fillStyle = '#ccddcc';
    ctx.fillRect(x+10, y+12, 8, 5);

    // HEAD
    ctx.fillStyle = '#eeffee';
    ctx.fillRect(x+3, y, PW-6, 14);
    // visor
    ctx.fillStyle = '#001408';
    ctx.fillRect(x+4, y+2, PW-8, 9);
    // eyes
    ctx.fillStyle = ac;
    const blinkH = Math.floor(frame/60)%8===0 ? 1 : 4;
    ctx.fillRect(x+5, y+3+(4-blinkH)/2, 7, blinkH);
    ctx.fillRect(x+16, y+3+(4-blinkH)/2, 7, blinkH);
    // antenna
    ctx.fillStyle = '#aaccaa';
    ctx.fillRect(x+12, y-6, 4, 7);
    ctx.fillStyle = ac;
    ctx.beginPath();
    ctx.arc(x+14, y-6, 3, 0, Math.PI*2);
    ctx.fill();
  }

  if (!duck) {
    // ARMS
    const armSwing = jump ? 0 : Math.sin(runFrame===0 ? 0.5 : -0.5) * 6;
    // left arm
    ctx.fillStyle = '#ccddcc';
    ctx.fillRect(x-2, y+18+armSwing, 6, 14);
    ctx.fillStyle = '#aabbaa';
    ctx.fillRect(x-3, y+30+armSwing, 8, 5);
    // right arm
    ctx.fillRect(x+PW-4, y+18-armSwing, 6, 14);
    ctx.fillStyle = '#aabbaa';
    ctx.fillRect(x+PW-5, y+30-armSwing, 8, 5);

    // LEGS
    const legOff = jump ? 5 : (runFrame===0 ? 0 : 10);
    // left leg
    ctx.fillStyle = '#667766';
    ctx.fillRect(x+3, y+36, 9, 10);
    ctx.fillRect(x+3, y+36+legOff*0.4, 9, 10);
    // right leg
    ctx.fillRect(x+PW-12, y+36, 9, 10);
    ctx.fillRect(x+PW-12, y+36+(10-legOff)*0.4, 9, 10);
    // feet
    ctx.fillStyle = '#445544';
    ctx.fillRect(x+1, y+44, 11, 4);
    ctx.fillRect(x+PW-12, y+44, 11, 4);
  }
  ctx.textAlign = 'left';
}

// ── DRAW OBSTACLES ────────────────────────────────────────────────
function drawObstacles() {
  for (const ob of obstacles) {
    const zone = ZONES[ob.zone];
    ctx.shadowBlur = 8; ctx.shadowColor = ob.color;

    if (ob.type === 'tall') {
      // tall spiky thing
      ctx.fillStyle = ob.color;
      ctx.fillRect(ob.x, ob.y+10, ob.w, ob.h-10);
      ctx.fillStyle = ob.color2;
      ctx.fillRect(ob.x+4, ob.y+10, ob.w-8, ob.h-10);
      // spikes
      ctx.fillStyle = ob.color;
      ctx.beginPath();
      ctx.moveTo(ob.x, ob.y+10); ctx.lineTo(ob.x+ob.w/2, ob.y); ctx.lineTo(ob.x+ob.w, ob.y+10);
      ctx.closePath(); ctx.fill();
    } else if (ob.type === 'wide') {
      // wide log/block
      ctx.fillStyle = ob.color2;
      ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
      ctx.fillStyle = ob.color;
      ctx.fillRect(ob.x, ob.y, ob.w, 6);
      ctx.fillRect(ob.x, ob.y+ob.h-6, ob.w, 6);
      // studs
      for (let s=0;s<3;s++) {
        ctx.fillStyle = ob.color;
        ctx.beginPath();
        ctx.arc(ob.x+10+s*18, ob.y+ob.h/2, 4, 0, Math.PI*2);
        ctx.fill();
      }
    } else if (ob.type === 'flying') {
      // flying enemy
      ctx.fillStyle = ob.color;
      const bob = Math.sin(frame*0.08)*4;
      ctx.beginPath();
      ctx.ellipse(ob.x+ob.w/2, ob.y+ob.h/2+bob, ob.w/2, ob.h/2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = ob.color2;
      ctx.beginPath();
      ctx.ellipse(ob.x+ob.w/2, ob.y+ob.h/2+bob, ob.w/3, ob.h/3, 0, 0, Math.PI*2);
      ctx.fill();
      // eye
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ob.x+ob.w/2, ob.y+ob.h/2+bob, 5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(ob.x+ob.w/2+1, ob.y+ob.h/2+bob, 2.5, 0, Math.PI*2);
      ctx.fill();
      // wings
      ctx.fillStyle = ob.color;
      ctx.globalAlpha = 0.6;
      const wingFlap = Math.sin(frame*0.2)*0.4;
      ctx.save();
      ctx.translate(ob.x+ob.w/2, ob.y+ob.h/2+bob);
      ctx.rotate(wingFlap);
      ctx.fillRect(-ob.w*0.8, -4, ob.w*0.7, 8);
      ctx.rotate(-wingFlap*2);
      ctx.fillRect(ob.w*0.1, -4, ob.w*0.7, 8);
      ctx.restore();
      ctx.globalAlpha = 1;
    }
    ctx.shadowBlur = 0;
  }
}

// ── DRAW COLLECTIBLES ────────────────────────────────────────────
function drawCollectibles() {
  for (const c of collectibles) {
    if (c.collected) continue;
    const bob = Math.sin(frame*0.07 + c.floatOffset) * 5;
    ctx.shadowBlur = 12; ctx.shadowColor = c.color;
    ctx.fillStyle = c.color;
    // spinning star shape
    ctx.save();
    ctx.translate(c.x+c.w/2, c.y+c.h/2+bob);
    ctx.rotate(frame*0.04);
    for (let i=0;i<5;i++) {
      ctx.save();
      ctx.rotate(i * Math.PI*2/5);
      ctx.fillRect(-3, -c.h/2-2, 6, c.h/2);
      ctx.restore();
    }
    // center
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    ctx.shadowBlur = 0;
  }
}

// ── DRAW PARTICLES ────────────────────────────────────────────────
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ── DRAW HUD ──────────────────────────────────────────────────────
function drawHUD() {
  const zone = ZONES[zoneIdx];
  // top bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, HUD_H);
  ctx.strokeStyle = zone.accent;
  ctx.globalAlpha = 0.3; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,HUD_H); ctx.lineTo(W,HUD_H); ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.font = 'bold 14px Courier New';
  ctx.fillStyle = zone.accent;
  ctx.textAlign = 'left';
  ctx.fillText(`ZONA: ${zone.name}`, 12, 26);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.fillText(`PONTOS  ${score}`, W/2, 26);

  ctx.textAlign = 'right';
  ctx.fillStyle = zone.accent;
  ctx.fillText(`HI  ${hiScore}   DIST ${Math.floor(distance)}m`, W-12, 26);

  // zone progress bar
  const pct = Math.min(1, zoneProgress / ZONE_LENGTH);
  ctx.fillStyle = zone.dim;
  ctx.fillRect(0, HUD_H-4, W, 4);
  ctx.fillStyle = zone.accent;
  ctx.fillRect(0, HUD_H-4, W * pct, 4);

  ctx.textAlign = 'left';
}

// ── DRAW POPUP ────────────────────────────────────────────────────
function drawPopup() {
  if (!popup) return;
  const a = popup.timer < 40 ? popup.timer/40 : 1;
  ctx.globalAlpha = a;
  const pw=260, ph=90, px=W-pw-12, py=HUD_H+10;
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = popup.color;
  ctx.lineWidth=2;
  ctx.shadowBlur=8; ctx.shadowColor=popup.color;
  ctx.strokeRect(px, py, pw, ph);
  ctx.shadowBlur=0;
  ctx.fillStyle = popup.color;
  ctx.font='bold 11px Courier New';
  ctx.textAlign='left';
  ctx.fillText('► ' + popup.title, px+10, py+18);
  ctx.fillStyle='#aabbaa';
  ctx.font='10px Courier New';
  popup.desc.split('\n').forEach((line,i) => ctx.fillText(line, px+10, py+36+i*16));
  ctx.globalAlpha=1; ctx.textAlign='left';
}

// ── DRAW ZONE BANNER ─────────────────────────────────────────────
function drawZoneBanner() {
  if (!zoneBanner) return;
  const a = zoneBanner.timer>90 ? (120-zoneBanner.timer)/30 : zoneBanner.timer<30 ? zoneBanner.timer/30 : 1;
  ctx.globalAlpha = a;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, H/2-30, W, 60);
  ctx.fillStyle = zoneBanner.color;
  ctx.font = 'bold 26px Courier New';
  ctx.textAlign = 'center';
  ctx.shadowBlur=15; ctx.shadowColor=zoneBanner.color;
  ctx.fillText('► ' + zoneBanner.text + ' ◄', W/2, H/2+10);
  ctx.shadowBlur=0;
  ctx.globalAlpha=1; ctx.textAlign='left';
}

// ── SCREENS ───────────────────────────────────────────────────────
function drawStart() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  // animated runner demo
  const demoZone = ZONES[Math.floor(frame/200)%ZONES.length];
  demoZone.bgDraw(1);
  drawGround();

  // demo character
  const rx = 120 + Math.sin(frame*0.02)*5;
  drawCharacter(rx, GROUND_Y-PH, Math.floor(frame/8)%2, 'run');

  // demo obstacles (decorative, no collision)
  ctx.globalAlpha=0.3;
  ctx.fillStyle = demoZone.obstColor;
  ctx.fillRect(500, GROUND_Y-55, 22, 55);
  ctx.globalAlpha=1;

  // title overlay
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,W,H);

  ctx.font='bold 54px Courier New';
  ctx.textAlign='center';
  ctx.shadowBlur=20; ctx.shadowColor=demoZone.accent;
  ctx.fillStyle=demoZone.accent;
  ctx.fillText('IFES', W/2, 130);
  ctx.fillText('RUNNER', W/2, 190);
  ctx.shadowBlur=0;

  ctx.fillStyle='#557755';
  ctx.font='13px Courier New';
  ctx.fillText('CAMPUS SERRA · PESQUISA & INOVAÇÃO', W/2, 220);

  // zones legend
  ZONES.forEach((z,i) => {
    const lx = W/2-220+i*115, ly=265;
    ctx.fillStyle=z.accent+'44';
    ctx.fillRect(lx-5, ly-20, 108, 60);
    ctx.strokeStyle=z.accent;
    ctx.lineWidth=1;
    ctx.strokeRect(lx-5, ly-20, 108, 60);
    ctx.fillStyle=z.accent;
    ctx.font='bold 10px Courier New';
    ctx.fillText(z.name, lx, ly);
    ctx.fillStyle='#556655';
    ctx.font='9px Courier New';
    ctx.fillText(z.projects[0].name.substring(0,14)+'...', lx, ly+16);
    ctx.fillText('Colete itens → aprenda!', lx, ly+30);
  });

  // controls
  ctx.fillStyle='#334433';
  ctx.font='11px Courier New';
  ctx.fillText('↑ ESPAÇO CLICK · PULAR     ↓ ABAIXAR     DUPLO SALTO DISPONÍVEL', W/2, 345);

  if (Math.floor(frame/30)%2===0) {
    ctx.fillStyle=demoZone.accent;
    ctx.font='bold 18px Courier New';
    ctx.shadowBlur=10; ctx.shadowColor=demoZone.accent;
    ctx.fillText('[ CLIQUE / ESPAÇO / ENTER PARA INICIAR ]', W/2, 390);
    ctx.shadowBlur=0;
  }

  ctx.fillStyle='#223322';
  ctx.font='11px Courier New';
  ctx.fillText('HI-SCORE: '+hiScore, W/2, 420);
  ctx.textAlign='left';
  frame++;
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.9)';
  ctx.fillRect(0,0,W,H);

  ctx.font='bold 52px Courier New';
  ctx.textAlign='center';
  ctx.fillStyle='#ff4444';
  ctx.shadowBlur=20; ctx.shadowColor='#ff0000';
  ctx.fillText('GAME OVER', W/2, 120);
  ctx.shadowBlur=0;

  const zone = ZONES[zoneIdx];
  ctx.fillStyle=zone.accent;
  ctx.font='bold 22px Courier New';
  ctx.fillText('PONTOS: '+score, W/2, 168);
  ctx.fillStyle='#eeee00';
  ctx.font='15px Courier New';
  ctx.fillText('HI-SCORE: '+hiScore, W/2, 198);

  const dkm = Math.floor(distance);
  ctx.fillStyle='#557755';
  ctx.font='13px Courier New';
  ctx.fillText(`DISTÂNCIA: ${dkm}m`, W/2, 228);

  // rank
  let rank, rc;
  if (distance>2000)       { rank='DOUTOR HONORIS CAUSA'; rc='#ffee00'; }
  else if (distance>1200)  { rank='PESQUISADOR SÊNIOR';   rc=zone.accent; }
  else if (distance>600)   { rank='BOLSISTA IC';           rc='#ff8800'; }
  else                     { rank='CURIOSO EM FORMAÇÃO';  rc='#557755'; }

  ctx.fillStyle=rc;
  ctx.font='bold 20px Courier New';
  ctx.shadowBlur=10; ctx.shadowColor=rc;
  ctx.fillText('► '+rank+' ◄', W/2, 280);
  ctx.shadowBlur=0;

  // zones visited
  ctx.fillStyle='#334433';
  ctx.font='12px Courier New';
  ctx.fillText(`ZONAS VISITADAS: ${Math.min(4, Math.floor(distance/ZONE_LENGTH/10)+1)} / 4`, W/2, 318);

  ctx.fillStyle='#334433';
  ctx.font='11px Courier New';
  ctx.fillText('Projetos desenvolvidos por alunos e professores do IFES Serra', W/2, 356);
  ctx.fillStyle=zone.accent;
  ctx.fillText('escola pública · pesquisa aplicada · impacto real no ES', W/2, 376);

  if (Math.floor(frame/30)%2===0) {
    ctx.fillStyle='#fff';
    ctx.font='bold 16px Courier New';
    ctx.fillText('[ ENTER / CLICK PARA JOGAR NOVAMENTE ]', W/2, 415);
  }
  ctx.textAlign='left';
  frame++;
}

// ── MAIN LOOP ─────────────────────────────────────────────────────
function loop() {
  if (state==='start')    { drawStart(); requestAnimationFrame(loop); return; }
  if (state==='gameover') { drawGameOver(); requestAnimationFrame(loop); return; }

  update();

  // background
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);
  ZONES[zoneIdx].bgDraw(zoneFade);

  drawGround();
  drawCollectibles();
  drawObstacles();
  drawParticles();
  drawPlayer();
  drawHUD();
  drawPopup();
  drawZoneBanner();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
