services:
  database:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=prefect
      - POSTGRES_PASSWORD=prefect
      - POSTGRES_DB=prefect
    ports:
      - "5433:5432"
    volumes:
      - prefect_db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U prefect" ]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: prefecthq/prefect:3.6.23-python3.12
    restart: always
    entrypoint: [ "/usr/bin/tini", "-g", "--", "prefect", "server", "start" ]
    environment:
      - PREFECT_UI_API_URL=http://127.0.0.1:4200/api
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@database:5432/prefect
      - PREFECT_SERVER_API_HOST=0.0.0.0
    ports:
      - "4200:4200"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: horizon-etl:latest
    user: "${UID:-1000}:${GID:-1000}"
    env_file: .env
    environment:
      PREFECT_API_URL: http://server:4200/api
      PREFECT_CLIENT_SERVER_VERSION_CHECK_ENABLED: "false"
      CHROME_BINARY: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
      STORAGE_TYPE: db
    volumes:
      - ./db:/app/db
      - ./data/exports:/app/data/exports
      - ./data/lattes_json:/app/data/lattes_json
      - ./data/raw:/app/data/raw
      - ./cache:/app/cache
      - ./logs:/app/logs
    depends_on:
      server:
        condition: service_healthy
    profiles:
      - app

volumes:
  prefect_db:
